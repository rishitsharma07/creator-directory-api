services:
  postgres:
    image: postgres:16
    container_name: creator-directory-db

    environment:
      POSTGRES_DB: creator_directory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGTZ: Asia/Kolkata

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: